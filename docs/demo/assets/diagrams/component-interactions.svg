<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9aa3b8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1b2a6b" flood-opacity="0.16"/>
    </filter>
    <filter id="shadowHub" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#c8401f" flood-opacity="0.28"/>
    </filter>
    <style>
      .title  { font-weight: 800; }
      .sub    { fill: #66708a; font-size: 14px; font-weight: 500; }
      .lbl    { fill: #586079; font-size: 14px; font-style: italic;
                paint-order: stroke; stroke: #ffffff; stroke-width: 5px; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- ===== grouping container for platform services ===== -->
  <rect x="812" y="44" width="356" height="512" rx="22" fill="#f6f8fc" stroke="#d4dcec" stroke-width="2" stroke-dasharray="2 8" stroke-linecap="round"/>
  <text x="990" y="34" text-anchor="middle" fill="#8893ab" font-size="15" font-weight="700" letter-spacing="0.5">PLATFORM SERVICES</text>

  <!-- ===== edges ===== -->
  <g fill="none" stroke="#aab3c6" stroke-width="2.6" marker-end="url(#arrow)">
    <path d="M118 250 H190"/>
    <path d="M384 270 H452"/>
    <path d="M712 244 C 772 200, 782 132, 838 116"/>
    <path d="M712 262 C 772 240, 782 240, 838 232"/>
    <path d="M712 290 C 772 320, 782 350, 838 360"/>
    <path d="M712 304 C 772 410, 782 466, 838 476"/>
  </g>
  <g class="lbl">
    <text x="120" y="240">browse / search</text>
    <text x="392" y="260">routes /ep-api/*</text>
    <text x="744" y="150">validate tokens</text>
    <text x="744" y="212">catalog API</text>
    <text x="744" y="356">register affinities</text>
    <text x="744" y="436">report metrics</text>
  </g>

  <!-- ===== Data User ===== -->
  <g>
    <circle cx="60" cy="250" r="34" fill="#1b2a6b" filter="url(#shadow)"/>
    <g fill="#ffffff" transform="translate(60,250)">
      <circle cx="0" cy="-8" r="9"/>
      <path d="M-15 14 a15 13 0 0 1 30 0 z"/>
    </g>
    <text x="60" y="312" text-anchor="middle" fill="#1b2a6b" class="title" font-size="16">Data User</text>
    <text x="60" y="332" text-anchor="middle" class="sub">/ Administrator</text>
  </g>

  <!-- ===== Nginx (entry) ===== -->
  <g filter="url(#shadow)">
    <rect x="190" y="218" width="194" height="104" rx="16" fill="#ffffff" stroke="#9aa0ac" stroke-width="2.4"/>
  </g>
  <g transform="translate(228,270)">
    <circle r="22" fill="#6b7280"/>
    <g fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-9 -10 V10"/><path d="M-3 0 H9"/><path d="M4 -5 L10 0 L4 5"/>
    </g>
  </g>
  <text x="262" y="264" fill="#3f3f46" class="title" font-size="17">Nginx</text>
  <text x="262" y="288" class="sub">single entry · :80</text>

  <!-- ===== NDP-EP (hub) ===== -->
  <g filter="url(#shadowHub)">
    <rect x="452" y="200" width="260" height="140" rx="20" fill="#fff3ee" stroke="#e0552f" stroke-width="3"/>
  </g>
  <g transform="translate(502,250)">
    <circle r="26" fill="#e0552f"/>
    <g fill="#ffffff">
      <rect x="-13" y="-15" width="26" height="8" rx="2.5"/>
      <rect x="-13" y="-4"  width="26" height="8" rx="2.5"/>
      <rect x="-13" y="7"   width="26" height="8" rx="2.5"/>
    </g>
  </g>
  <text x="582" y="246" text-anchor="middle" fill="#c8401f" class="title" font-size="23">NDP-EP</text>
  <text x="582" y="272" text-anchor="middle" fill="#c8401f" font-size="14.5" font-weight="600">Unified REST API</text>
  <text x="582" y="306" text-anchor="middle" fill="#a9583f" font-size="13">datasets · search · storage</text>

  <!-- ===== Services ===== -->
  <!-- IAM -->
  <g filter="url(#shadow)"><rect x="838" y="80" width="300" height="96" rx="16" fill="#ffffff" stroke="#2f6fb3" stroke-width="2.4"/></g>
  <g transform="translate(884,128)">
    <circle r="22" fill="#2f6fb3"/>
    <g fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round">
      <rect x="-11" y="-2" width="22" height="16" rx="3" fill="#ffffff" stroke="none"/>
      <path d="M-7 -2 V-8 a7 7 0 0 1 14 0 V-2" />
    </g>
  </g>
  <text x="918" y="122" fill="#0b4884" class="title" font-size="17">Identity &amp; Access</text>
  <text x="918" y="146" class="sub">Keycloak + AAI · tokens &amp; roles</text>

  <!-- CKAN -->
  <g filter="url(#shadow)"><rect x="838" y="196" width="300" height="96" rx="16" fill="#ffffff" stroke="#2f6fb3" stroke-width="2.4"/></g>
  <g transform="translate(884,244)">
    <circle r="22" fill="#2f6fb3"/>
    <g fill="none" stroke="#ffffff" stroke-width="2.8">
      <ellipse cx="0" cy="-9" rx="12" ry="5"/>
      <path d="M-12 -9 V9 a12 5 0 0 0 24 0 V-9"/>
      <path d="M-12 0 a12 5 0 0 0 24 0"/>
    </g>
  </g>
  <text x="918" y="238" fill="#0b4884" class="title" font-size="17">CKAN</text>
  <text x="918" y="262" class="sub">local data catalog</text>

  <!-- Affinities -->
  <g filter="url(#shadow)"><rect x="838" y="312" width="300" height="96" rx="16" fill="#ffffff" stroke="#2f6fb3" stroke-width="2.4"/></g>
  <g transform="translate(884,360)">
    <circle r="22" fill="#2f6fb3"/>
    <g stroke="#ffffff" stroke-width="2.6"><path d="M-9 -7 L9 -7 M-7 -5 L0 9 M7 -5 L0 9"/></g>
    <g fill="#ffffff"><circle cx="-9" cy="-7" r="4.5"/><circle cx="9" cy="-7" r="4.5"/><circle cx="0" cy="9" r="4.5"/></g>
  </g>
  <text x="918" y="354" fill="#0b4884" class="title" font-size="17">Affinities</text>
  <text x="918" y="378" class="sub">relationships graph</text>

  <!-- Federation -->
  <g filter="url(#shadow)"><rect x="838" y="428" width="300" height="96" rx="16" fill="#ffffff" stroke="#2f6fb3" stroke-width="2.4"/></g>
  <g transform="translate(884,476)">
    <circle r="22" fill="#2f6fb3"/>
    <g stroke="#ffffff" stroke-width="2.6"><path d="M0 0 L-11 -9 M0 0 L11 -9 M0 0 L-11 9 M0 0 L11 9"/></g>
    <g fill="#ffffff"><circle cx="0" cy="0" r="5.5"/><circle cx="-11" cy="-9" r="3.6"/><circle cx="11" cy="-9" r="3.6"/><circle cx="-11" cy="9" r="3.6"/><circle cx="11" cy="9" r="3.6"/></g>
  </g>
  <text x="918" y="470" fill="#0b4884" class="title" font-size="17">Federation</text>
  <text x="918" y="494" class="sub">endpoint registry · health</text>
</svg>
