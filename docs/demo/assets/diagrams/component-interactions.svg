<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 580" width="980" height="580" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9aa3b8"/>
    </marker>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1b2a6b" flood-opacity="0.16"/>
    </filter>
    <filter id="shadowHub" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#c8401f" flood-opacity="0.26"/>
    </filter>
    <style>
      .title { font-weight: 800; }
      .sub   { fill: #66708a; font-size: 13px; font-weight: 500; }
      .lbl   { fill: #586079; font-size: 13.5px; font-style: italic;
               paint-order: stroke; stroke: #ffffff; stroke-width: 5px; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- ===== edges ===== -->
  <g fill="none" stroke="#aab3c6" stroke-width="2.6" marker-end="url(#arrow)">
    <path d="M185 80 V108"/>                                  <!-- user -> AAI -->
    <path d="M185 204 V268"/>                                 <!-- AAI -> NDP-EP -->
    <path d="M312 300 C 410 252, 460 182, 556 168"/>          <!-- EP -> CKAN/S3 -->
    <path d="M312 322 C 420 320, 450 316, 556 316"/>          <!-- EP -> Affinities -->
    <path d="M312 344 C 410 396, 460 452, 556 464"/>          <!-- EP -> Federation -->
  </g>
  <g class="lbl">
    <text x="198" y="98">log in</text>
    <text x="198" y="242">token (identity + role)</text>
    <text x="372" y="206">catalog + storage</text>
    <text x="360" y="300">register datasets &amp; services</text>
    <text x="372" y="438">register · report metrics</text>
  </g>

  <!-- ===== Data User ===== -->
  <circle cx="185" cy="46" r="28" fill="#1b2a6b" filter="url(#shadow)"/>
  <g fill="#ffffff" transform="translate(185,46)">
    <circle cx="0" cy="-7" r="8"/>
    <path d="M-13 12 a13 11 0 0 1 26 0 z"/>
  </g>
  <text x="233" y="42" fill="#1b2a6b" class="title" font-size="16">Data User</text>
  <text x="233" y="61" class="sub">/ Administrator</text>

  <!-- ===== AAI (identity AND roles live here) ===== -->
  <g filter="url(#shadow)"><rect x="60" y="108" width="250" height="96" rx="16" fill="#ffffff" stroke="#2f6fb3" stroke-width="2.4"/></g>
  <g transform="translate(100,156)">
    <circle r="22" fill="#2f6fb3"/>
    <g fill="#ffffff"><rect x="-11" y="-2" width="22" height="15" rx="3"/></g>
    <path d="M-7 -2 V-8 a7 7 0 0 1 14 0 V-2" fill="none" stroke="#ffffff" stroke-width="3"/>
  </g>
  <text x="134" y="150" fill="#0b4884" class="title" font-size="17">AAI · Identity</text>
  <text x="134" y="172" class="sub">Keycloak · tokens + roles</text>

  <!-- ===== NDP-EP (on the spine) ===== -->
  <g filter="url(#shadowHub)"><rect x="60" y="270" width="252" height="106" rx="16" fill="#fff3ee" stroke="#e0552f" stroke-width="2.8"/></g>
  <g transform="translate(100,323)">
    <circle r="23" fill="#e0552f"/>
    <g fill="#ffffff"><rect x="-12" y="-13" width="24" height="7" rx="2.3"/><rect x="-12" y="-3.5" width="24" height="7" rx="2.3"/><rect x="-12" y="6" width="24" height="7" rx="2.3"/></g>
  </g>
  <text x="136" y="312" fill="#c8401f" class="title" font-size="18">NDP-EP</text>
  <text x="136" y="334" fill="#c8401f" font-size="13.5" font-weight="600">Endpoint · REST API</text>
  <text x="136" y="354" fill="#a9583f" font-size="12.5">datasets · search · storage</text>

  <!-- ===== CKAN / S3 backends ===== -->
  <g filter="url(#shadow)"><rect x="556" y="120" width="300" height="92" rx="16" fill="#ffffff" stroke="#2f6fb3" stroke-width="2.4"/></g>
  <g transform="translate(602,166)">
    <circle r="22" fill="#2f6fb3"/>
    <g fill="none" stroke="#ffffff" stroke-width="2.8">
      <ellipse cx="0" cy="-9" rx="12" ry="5"/>
      <path d="M-12 -9 V9 a12 5 0 0 0 24 0 V-9"/>
      <path d="M-12 0 a12 5 0 0 0 24 0"/>
    </g>
  </g>
  <text x="636" y="160" fill="#0b4884" class="title" font-size="17">CKAN · MinIO (S3)</text>
  <text x="636" y="183" class="sub">catalog &amp; object storage</text>

  <!-- ===== Affinities (the EP registers into it) ===== -->
  <g filter="url(#shadow)"><rect x="556" y="270" width="300" height="92" rx="16" fill="#ffffff" stroke="#2f6fb3" stroke-width="2.4"/></g>
  <g transform="translate(602,316)">
    <circle r="22" fill="#2f6fb3"/>
    <g stroke="#ffffff" stroke-width="2.6"><path d="M-9 -7 L9 -7 M-7 -5 L0 9 M7 -5 L0 9"/></g>
    <g fill="#ffffff"><circle cx="-9" cy="-7" r="4.3"/><circle cx="9" cy="-7" r="4.3"/><circle cx="0" cy="9" r="4.3"/></g>
  </g>
  <text x="636" y="310" fill="#0b4884" class="title" font-size="17">Affinities</text>
  <text x="636" y="333" class="sub">relationships: data · services · EPs</text>

  <!-- ===== Federation (the EP registers into it) ===== -->
  <g filter="url(#shadow)"><rect x="556" y="420" width="300" height="92" rx="16" fill="#ffffff" stroke="#2f6fb3" stroke-width="2.4"/></g>
  <g transform="translate(602,466)">
    <circle r="22" fill="#2f6fb3"/>
    <g stroke="#ffffff" stroke-width="2.6"><path d="M0 0 L-11 -9 M0 0 L11 -9 M0 0 L-11 9 M0 0 L11 9"/></g>
    <g fill="#ffffff"><circle cx="0" cy="0" r="5.2"/><circle cx="-11" cy="-9" r="3.4"/><circle cx="11" cy="-9" r="3.4"/><circle cx="-11" cy="9" r="3.4"/><circle cx="11" cy="9" r="3.4"/></g>
  </g>
  <text x="636" y="460" fill="#0b4884" class="title" font-size="17">Federation</text>
  <text x="636" y="483" class="sub">endpoint registry · health</text>

  <!-- ===== NetBird footnote ===== -->
  <g transform="translate(60,532)">
    <rect x="0" y="0" width="796" height="38" rx="12" fill="#f6f8fc" stroke="#cdd6e8" stroke-width="2" stroke-dasharray="2 7" stroke-linecap="round"/>
    <g transform="translate(26,19)">
      <circle r="13" fill="#1b2a6b"/>
      <g fill="none"><rect x="-6" y="-1" width="12" height="8" rx="2" fill="#ffffff"/><path d="M-4 -1 V-4 a4 4 0 0 1 8 0 V-1" stroke="#ffffff" stroke-width="2" fill="none"/></g>
    </g>
    <text x="50" y="24" fill="#1b2a6b" font-size="14" font-weight="700">All of this can run over a private, encrypted NetBird network</text>
  </g>
</svg>
