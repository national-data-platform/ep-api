<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9aa3b8"/>
    </marker>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1b2a6b" flood-opacity="0.16"/>
    </filter>
    <filter id="shadowHub" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#c8401f" flood-opacity="0.26"/>
    </filter>
    <style>
      .title { font-weight: 800; }
      .sub   { fill: #66708a; font-size: 13.5px; font-weight: 500; }
      .lbl   { fill: #586079; font-size: 14px; font-style: italic;
               paint-order: stroke; stroke: #ffffff; stroke-width: 5px; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- ===== edges ===== -->
  <g fill="none" stroke="#aab3c6" stroke-width="2.6" marker-end="url(#arrow)">
    <path d="M240 78 V108"/>                 <!-- user -> AAI -->
    <path d="M362 156 H596"/>                <!-- AAI -> Affinities -->
    <path d="M240 204 V266"/>                <!-- AAI -> NDP-EP -->
    <path d="M362 322 H596"/>                <!-- NDP-EP -> Federation -->
    <path d="M240 376 V444"/>                <!-- NDP-EP -> CKAN/S3 -->
  </g>
  <g class="lbl">
    <text x="252" y="98">log in</text>
    <text x="382" y="146">which group &amp; role</text>
    <text x="252" y="240">token (identity + role)</text>
    <text x="382" y="312">register · report metrics</text>
    <text x="252" y="416">catalog + storage</text>
  </g>

  <!-- ===== Data User ===== -->
  <circle cx="240" cy="44" r="28" fill="#1b2a6b" filter="url(#shadow)"/>
  <g fill="#ffffff" transform="translate(240,44)">
    <circle cx="0" cy="-7" r="8"/>
    <path d="M-13 12 a13 11 0 0 1 26 0 z"/>
  </g>
  <text x="288" y="40" fill="#1b2a6b" class="title" font-size="16">Data User</text>
  <text x="288" y="59" class="sub">/ Administrator</text>

  <!-- ===== AAI ===== -->
  <g filter="url(#shadow)"><rect x="120" y="108" width="242" height="96" rx="16" fill="#ffffff" stroke="#2f6fb3" stroke-width="2.4"/></g>
  <g transform="translate(160,156)">
    <circle r="22" fill="#2f6fb3"/>
    <g fill="#ffffff"><rect x="-11" y="-2" width="22" height="15" rx="3"/></g>
    <path d="M-7 -2 V-8 a7 7 0 0 1 14 0 V-2" fill="none" stroke="#ffffff" stroke-width="3"/>
  </g>
  <text x="194" y="150" fill="#0b4884" class="title" font-size="17">AAI · Identity</text>
  <text x="194" y="173" class="sub">Keycloak · tokens</text>

  <!-- ===== Affinities ===== -->
  <g filter="url(#shadow)"><rect x="596" y="108" width="242" height="96" rx="16" fill="#ffffff" stroke="#2f6fb3" stroke-width="2.4"/></g>
  <g transform="translate(636,156)">
    <circle r="22" fill="#2f6fb3"/>
    <g stroke="#ffffff" stroke-width="2.6"><path d="M-9 -7 L9 -7 M-7 -5 L0 9 M7 -5 L0 9"/></g>
    <g fill="#ffffff"><circle cx="-9" cy="-7" r="4.3"/><circle cx="9" cy="-7" r="4.3"/><circle cx="0" cy="9" r="4.3"/></g>
  </g>
  <text x="670" y="150" fill="#0b4884" class="title" font-size="17">Affinities</text>
  <text x="670" y="173" class="sub">groups &amp; roles</text>

  <!-- ===== NDP-EP (part of the spine, lightly highlighted) ===== -->
  <g filter="url(#shadowHub)"><rect x="120" y="270" width="242" height="106" rx="16" fill="#fff3ee" stroke="#e0552f" stroke-width="2.8"/></g>
  <g transform="translate(160,323)">
    <circle r="23" fill="#e0552f"/>
    <g fill="#ffffff"><rect x="-12" y="-13" width="24" height="7" rx="2.3"/><rect x="-12" y="-3.5" width="24" height="7" rx="2.3"/><rect x="-12" y="6" width="24" height="7" rx="2.3"/></g>
  </g>
  <text x="196" y="312" fill="#c8401f" class="title" font-size="18">NDP-EP</text>
  <text x="196" y="334" fill="#c8401f" font-size="13.5" font-weight="600">Endpoint · REST API</text>
  <text x="196" y="354" fill="#a9583f" font-size="12.5">datasets · search</text>

  <!-- ===== Federation ===== -->
  <g filter="url(#shadow)"><rect x="596" y="276" width="242" height="96" rx="16" fill="#ffffff" stroke="#2f6fb3" stroke-width="2.4"/></g>
  <g transform="translate(636,324)">
    <circle r="22" fill="#2f6fb3"/>
    <g stroke="#ffffff" stroke-width="2.6"><path d="M0 0 L-11 -9 M0 0 L11 -9 M0 0 L-11 9 M0 0 L11 9"/></g>
    <g fill="#ffffff"><circle cx="0" cy="0" r="5.2"/><circle cx="-11" cy="-9" r="3.4"/><circle cx="11" cy="-9" r="3.4"/><circle cx="-11" cy="9" r="3.4"/><circle cx="11" cy="9" r="3.4"/></g>
  </g>
  <text x="670" y="318" fill="#0b4884" class="title" font-size="17">Federation</text>
  <text x="670" y="341" class="sub">endpoint registry</text>

  <!-- ===== CKAN / S3 backends ===== -->
  <g filter="url(#shadow)"><rect x="120" y="444" width="242" height="96" rx="16" fill="#ffffff" stroke="#2f6fb3" stroke-width="2.4"/></g>
  <g transform="translate(160,492)">
    <circle r="22" fill="#2f6fb3"/>
    <g fill="none" stroke="#ffffff" stroke-width="2.8">
      <ellipse cx="0" cy="-9" rx="12" ry="5"/>
      <path d="M-12 -9 V9 a12 5 0 0 0 24 0 V-9"/>
      <path d="M-12 0 a12 5 0 0 0 24 0"/>
    </g>
  </g>
  <text x="194" y="486" fill="#0b4884" class="title" font-size="17">CKAN · MinIO (S3)</text>
  <text x="194" y="509" class="sub">catalog &amp; object storage</text>

  <!-- ===== NetBird footnote ===== -->
  <g transform="translate(596,470)">
    <rect x="0" y="0" width="242" height="70" rx="16" fill="#f6f8fc" stroke="#cdd6e8" stroke-width="2" stroke-dasharray="2 7" stroke-linecap="round"/>
    <g transform="translate(34,35)">
      <circle r="17" fill="#1b2a6b"/>
      <g fill="none" stroke="#ffffff" stroke-width="2.4"><rect x="-8" y="-1" width="16" height="11" rx="2.5" fill="#ffffff" stroke="none"/><path d="M-5 -1 V-5 a5 5 0 0 1 10 0 V-1"/></g>
    </g>
    <text x="62" y="30" fill="#1b2a6b" font-size="13.5" font-weight="700">Runs over a private</text>
    <text x="62" y="49" fill="#1b2a6b" font-size="13.5" font-weight="700">NetBird network</text>
  </g>
</svg>
