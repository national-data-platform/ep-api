<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" width="1180" height="560" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7d8aa6"/>
    </marker>
  </defs>

  <!-- ===== edges (drawn first, behind boxes) ===== -->
  <g stroke="#7d8aa6" stroke-width="2.4" fill="none" marker-end="url(#arrow)">
    <path d="M150 280 H250"/>                 <!-- user -> nginx -->
    <path d="M430 280 H520"/>                 <!-- nginx -> ep-api -->
    <path d="M760 250 C 815 200, 815 90, 868 70"/>   <!-- ep-api -> IAM -->
    <path d="M760 268 C 815 230, 815 200, 868 188"/> <!-- ep-api -> CKAN -->
    <path d="M760 300 C 815 330, 815 360, 868 372"/> <!-- ep-api -> Affinities -->
    <path d="M760 318 C 815 400, 815 470, 868 490"/> <!-- ep-api -> Federation -->
  </g>

  <!-- edge labels -->
  <g fill="#55617d" font-size="13.5" font-style="italic">
    <text x="180" y="270">browse / search</text>
    <text x="455" y="270">routes /ep-api/*</text>
    <text x="792" y="150">validate tokens</text>
    <text x="800" y="214">catalog (CKAN API)</text>
    <text x="792" y="350">register affinities</text>
    <text x="800" y="432">report metrics</text>
  </g>

  <!-- ===== Data User (person) ===== -->
  <g>
    <circle cx="70" cy="250" r="20" fill="#1b2a6b"/>
    <path d="M38 300 a32 28 0 0 1 64 0 z" fill="#1b2a6b"/>
    <text x="70" y="330" text-anchor="middle" fill="#1b2a6b" font-size="17" font-weight="700">Data User</text>
    <text x="70" y="350" text-anchor="middle" fill="#55617d" font-size="13">/ Administrator</text>
  </g>

  <!-- ===== Nginx reverse proxy ===== -->
  <g>
    <rect x="250" y="236" width="180" height="92" rx="12" fill="#ffffff" stroke="#6b6b6b" stroke-width="2.5"/>
    <text x="340" y="272" text-anchor="middle" fill="#3f3f3f" font-size="17" font-weight="700">Nginx proxy</text>
    <text x="340" y="296" text-anchor="middle" fill="#6b6b6b" font-size="13.5">single entry · :80</text>
  </g>

  <!-- ===== NDP-EP (highlighted hub) ===== -->
  <g>
    <rect x="520" y="226" width="240" height="116" rx="14" fill="#fdece8" stroke="#d14a2e" stroke-width="3"/>
    <text x="640" y="270" text-anchor="middle" fill="#b3361f" font-size="20" font-weight="800">NDP-EP</text>
    <text x="640" y="295" text-anchor="middle" fill="#b3361f" font-size="14">Unified REST API</text>
    <text x="640" y="316" text-anchor="middle" fill="#9a4636" font-size="12.5">datasets · search · storage</text>
  </g>

  <!-- ===== right column systems ===== -->
  <g font-size="16.5" font-weight="700">
    <!-- IAM -->
    <rect x="868" y="30" width="270" height="84" rx="12" fill="#ffffff" stroke="#1168bd" stroke-width="2.6"/>
    <text x="1003" y="64" text-anchor="middle" fill="#0b4884">Identity &amp; Access (AAI)</text>
    <text x="1003" y="88" text-anchor="middle" fill="#55617d" font-size="13" font-weight="400">Keycloak + AAI · tokens &amp; roles</text>
    <!-- CKAN -->
    <rect x="868" y="146" width="270" height="84" rx="12" fill="#ffffff" stroke="#1168bd" stroke-width="2.6"/>
    <text x="1003" y="180" text-anchor="middle" fill="#0b4884">CKAN</text>
    <text x="1003" y="204" text-anchor="middle" fill="#55617d" font-size="13" font-weight="400">local data catalog</text>
    <!-- Affinities -->
    <rect x="868" y="330" width="270" height="84" rx="12" fill="#ffffff" stroke="#1168bd" stroke-width="2.6"/>
    <text x="1003" y="364" text-anchor="middle" fill="#0b4884">Affinities</text>
    <text x="1003" y="388" text-anchor="middle" fill="#55617d" font-size="13" font-weight="400">relationships graph</text>
    <!-- Federation -->
    <rect x="868" y="446" width="270" height="84" rx="12" fill="#ffffff" stroke="#1168bd" stroke-width="2.6"/>
    <text x="1003" y="480" text-anchor="middle" fill="#0b4884">Federation</text>
    <text x="1003" y="504" text-anchor="middle" fill="#55617d" font-size="13" font-weight="400">endpoint registry · health</text>
  </g>
</svg>
